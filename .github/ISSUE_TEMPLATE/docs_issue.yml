name: Docs issue
description: Report unclear, missing, or incorrect documentation
title: "[docs] "
labels: ["documentation"]
body:
  - type: input
    id: page
    attributes:
      label: Affected page
      placeholder: docs/quickstart.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is wrong
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested improvement
